<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager — Rakib Hasan Blog</title>
    <style>
      #cms-error {
        display: none;
        font-family: monospace;
        background: #1a1a2e;
        color: #e94560;
        padding: 2rem;
        white-space: pre-wrap;
        word-break: break-all;
        position: fixed;
        inset: 0;
        overflow: auto;
        z-index: 99999;
      }
    </style>
  </head>
  <body>
    <div id="cms-error"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var box = document.getElementById('cms-error');
        box.style.display = 'block';
        box.textContent = 'UNCAUGHT ERROR\n\n' + msg + '\n\nSource: ' + src + ':' + line + ':' + col + '\n\nStack:\n' + (err && err.stack ? err.stack : 'n/a');
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var box = document.getElementById('cms-error');
        box.style.display = 'block';
        box.textContent += '\n\nUNHANDLED PROMISE REJECTION\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
      });
    </script>

    <!-- Prevent Decap CMS from auto-initialising so we can register widgets first -->
    <script>window.CMS_MANUAL_INIT = true;</script>

    <script
      src="https://cdn.jsdelivr.net/npm/decap-cms@3.14.1/dist/decap-cms.js"
      onerror="document.getElementById('cms-error').style.display='block'; document.getElementById('cms-error').textContent='FAILED TO LOAD decap-cms.js FROM CDN\n\nCheck your internet connection or try a hard refresh (Ctrl+Shift+R).';"
    ></script>

    <script>
    // ── Journey Steps Custom Widget ────────────────────────────────────────────
    // Registered before CMS.init() so it is available when the journey
    // collection editor loads.
    //
    // IMPORTANT: window.React must NOT be accessed at registration time because
    // Decap CMS v3 may not have set it yet when this IIFE runs. Both components
    // are written as plain functions (React functional components) so that React
    // is only accessed inside the function body — i.e. at render time, when the
    // CMS guarantees React is available.
    (function () {
      if (!window.CMS) {
        console.error('[journey-steps] window.CMS not found — widget skipped');
        return;
      }

      // ── Pure tree utilities (no DOM, no React) ─────────────────────────────

      function parseLevelPath(lp) {
        var parts = lp.split('.');
        var depth = parseInt(parts[0], 10);
        if (depth === 0) return { depth: 0, parentPath: null, ownIndex: 0 };
        var ownIndex = parseInt(parts[parts.length - 1], 10);
        var parentDepth = depth - 1;
        var parentPath = parentDepth === 0
          ? '0'
          : (parentDepth + '.' + parts.slice(1, -1).join('.'));
        return { depth: depth, parentPath: parentPath, ownIndex: ownIndex };
      }

      function buildTree(steps) {
        if (!steps || !steps.length) return null;
        var nodeMap = {};
        steps.forEach(function (s) {
          nodeMap[s.levelPath] = { step: Object.assign({}, s), children: [], levelPath: s.levelPath };
        });
        var root = null;
        Object.values(nodeMap).forEach(function (node) {
          var info = parseLevelPath(node.levelPath);
          if (info.depth === 0) {
            root = node;
          } else if (info.parentPath && nodeMap[info.parentPath]) {
            nodeMap[info.parentPath].children.push(node);
          }
        });
        function sortChildren(node) {
          node.children.sort(function (a, b) {
            return parseLevelPath(a.levelPath).ownIndex - parseLevelPath(b.levelPath).ownIndex;
          });
          node.children.forEach(sortChildren);
        }
        if (root) sortChildren(root);
        return root;
      }

      function recomputePaths(node, depth, ancestorChain) {
        node.step.levelPath = depth === 0 ? '0' : (depth + '.' + ancestorChain.join('.'));
        node.levelPath = node.step.levelPath;
        node.children.forEach(function (child, idx) {
          recomputePaths(child, depth + 1, ancestorChain.concat([idx]));
        });
      }

      function flattenTree(node) {
        var result = [Object.assign({}, node.step)];
        node.children.forEach(function (child) {
          result = result.concat(flattenTree(child));
        });
        return result;
      }

      function findNode(node, lp) {
        if (!node) return null;
        if (node.levelPath === lp) return node;
        for (var i = 0; i < node.children.length; i++) {
          var found = findNode(node.children[i], lp);
          if (found) return found;
        }
        return null;
      }

      function deepClone(node) {
        return {
          step: Object.assign({}, node.step),
          levelPath: node.levelPath,
          children: node.children.map(deepClone),
        };
      }

      function removeNode(root, lp) {
        function removeFrom(node) {
          node.children = node.children.filter(function (c) {
            if (c.levelPath === lp) return false;
            removeFrom(c);
            return true;
          });
        }
        removeFrom(root);
      }

      function insertBesideNode(root, targetLp, newNode, position) {
        function insertIn(node) {
          for (var i = 0; i < node.children.length; i++) {
            if (node.children[i].levelPath === targetLp) {
              var idx = position === 'before' ? i : i + 1;
              node.children.splice(idx, 0, newNode);
              return true;
            }
            if (insertIn(node.children[i])) return true;
          }
          return false;
        }
        insertIn(root);
      }

      // ── Widget Control (functional component — React accessed at render time) ─

      function JourneyStepsControl(props) {
        var React = window.React;
        var h = React.createElement;
        var useState = React.useState;

        var _drag = useState(null); var draggedPath = _drag[0]; var setDraggedPath = _drag[1];
        var _tgt  = useState(null); var dropTargetPath = _tgt[0]; var setDropTargetPath = _tgt[1];
        var _pos  = useState(null); var dropPosition = _pos[0]; var setDropPosition = _pos[1];
        var _edit = useState(null); var editingPath = _edit[0]; var setEditingPath = _edit[1];

        function getSteps() {
          var val = props.value;
          if (!val) return [];
          if (typeof val.toJS === 'function') return val.toJS();
          if (Array.isArray(val)) return val;
          return [];
        }

        function emitChange(steps) {
          var out = (window.Immutable && window.Immutable.fromJS)
            ? window.Immutable.fromJS(steps)
            : steps;
          props.onChange(out);
        }

        function handleAddRoot() {
          var steps = getSteps();
          if (steps.some(function (s) { return s.levelPath === '0'; })) return;
          emitChange([{
            levelPath: '0',
            levelTitle: 'Root',
            title: 'Journey Title',
            description: '',
          }].concat(steps));
        }

        function handleAddChild(parentLp) {
          var steps = getSteps();
          var root = buildTree(steps);
          if (!root) return;
          var parentNode = findNode(root, parentLp);
          if (!parentNode) return;
          var newIndex = parentNode.children.length;
          var parentParts = parentLp.split('.');
          var parentDepth = parseInt(parentParts[0], 10);
          var newDepth = parentDepth + 1;
          var parentAncestors = parentParts.slice(1);
          var newAncestors = parentAncestors.concat([String(newIndex)]);
          var newPath = newDepth + '.' + newAncestors.join('.');
          var newStep = { levelPath: newPath, levelTitle: 'New Step', title: '', description: '' };
          parentNode.children.push({ step: newStep, children: [], levelPath: newPath });
          recomputePaths(root, 0, []);
          emitChange(flattenTree(root));
        }

        function handleDelete(lp) {
          if (lp === '0') {
            if (!window.confirm('Delete root? This removes the entire tree.')) return;
            emitChange([]);
            return;
          }
          var steps = getSteps();
          var root = buildTree(steps);
          if (!root) return;
          removeNode(root, lp);
          recomputePaths(root, 0, []);
          emitChange(flattenTree(root));
          if (editingPath === lp) setEditingPath(null);
        }

        function handleFieldChange(lp, field, value) {
          var steps = getSteps().map(function (s) {
            if (s.levelPath !== lp) return s;
            var updated = Object.assign({}, s);
            updated[field] = value;
            return updated;
          });
          emitChange(steps);
        }

        function handleDragStart(e, lp) {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', lp);
          setDraggedPath(lp);
        }

        function handleDragOver(e, lp) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          var rect = e.currentTarget.getBoundingClientRect();
          var yRel = (e.clientY - rect.top) / rect.height;
          var position = yRel < 0.25 ? 'before' : (yRel > 0.75 ? 'after' : 'child');
          if (dropTargetPath !== lp || dropPosition !== position) {
            setDropTargetPath(lp);
            setDropPosition(position);
          }
        }

        function handleDrop(e, targetLp) {
          e.preventDefault();
          var dp = draggedPath;
          var pos = dropPosition;
          setDraggedPath(null);
          setDropTargetPath(null);
          setDropPosition(null);

          if (!dp || dp === targetLp) return;
          if (dp === '0') return;

          var steps = getSteps();
          var root = buildTree(steps);
          if (!root) return;

          var draggedNode = findNode(root, dp);
          if (!draggedNode) return;
          if (findNode(draggedNode, targetLp)) return;

          var cloned = deepClone(draggedNode);
          removeNode(root, dp);

          if (pos === 'child') {
            var targetNode = findNode(root, targetLp);
            if (targetNode) targetNode.children.push(cloned);
          } else {
            insertBesideNode(root, targetLp, cloned, pos);
          }

          recomputePaths(root, 0, []);
          emitChange(flattenTree(root));
        }

        function handleDragEnd() {
          setDraggedPath(null);
          setDropTargetPath(null);
          setDropPosition(null);
        }

        function renderNode(node, depth) {
          var lp = node.levelPath;
          var isEditing = editingPath === lp;
          var isDragging = draggedPath === lp;
          var isTarget = dropTargetPath === lp;
          var dropPos = dropPosition;

          var borderStyle = isTarget
            ? ('2px dashed ' + (dropPos === 'child' ? '#6366f1' : '#22c55e'))
            : '1px solid #e5e7eb';
          var bgColor = (isTarget && dropPos === 'child') ? '#eef2ff' : '#fafafa';

          return h('div', { key: lp },
            h('div', {
              draggable: true,
              onDragStart: function (e) { handleDragStart(e, lp); },
              onDragOver: function (e) { handleDragOver(e, lp); },
              onDrop: function (e) { handleDrop(e, lp); },
              onDragEnd: handleDragEnd,
              style: {
                display: 'flex', alignItems: 'center', gap: '6px',
                padding: '8px 10px', marginBottom: '4px', marginLeft: (depth * 22) + 'px',
                border: borderStyle, borderRadius: '6px', background: bgColor,
                opacity: isDragging ? 0.4 : 1, cursor: 'grab', userSelect: 'none',
              }
            },
              h('span', { style: { color: '#9ca3af', fontSize: '16px', lineHeight: 1 } }, '⠿'),
              h('code', {
                style: {
                  fontSize: '11px', background: '#e0e7ff', color: '#4338ca',
                  padding: '1px 5px', borderRadius: '4px', flexShrink: 0,
                }
              }, lp),
              h('strong', {
                style: { fontSize: '12px', color: '#374151', flexShrink: 0, maxWidth: '120px',
                         overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }
              }, node.step.levelTitle || '—'),
              h('span', {
                style: { fontSize: '12px', color: '#6b7280', flex: 1,
                         overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }
              }, node.step.title || '(no title)'),
              h('button', {
                type: 'button',
                onClick: function () { setEditingPath(isEditing ? null : lp); },
                style: {
                  fontSize: '11px', padding: '2px 7px', cursor: 'pointer',
                  border: '1px solid #d1d5db', borderRadius: '4px',
                  background: isEditing ? '#6366f1' : '#fff',
                  color: isEditing ? '#fff' : '#374151', flexShrink: 0,
                }
              }, isEditing ? 'Done' : 'Edit'),
              h('button', {
                type: 'button',
                onClick: function () { handleAddChild(lp); },
                style: {
                  fontSize: '11px', padding: '2px 7px', cursor: 'pointer',
                  border: '1px solid #a5b4fc', borderRadius: '4px',
                  background: '#eef2ff', color: '#4f46e5', flexShrink: 0,
                }
              }, '+ Child'),
              h('button', {
                type: 'button',
                onClick: function () { handleDelete(lp); },
                style: {
                  fontSize: '11px', padding: '2px 7px', cursor: 'pointer',
                  border: '1px solid #fca5a5', borderRadius: '4px',
                  background: '#fef2f2', color: '#ef4444', flexShrink: 0,
                }
              }, '×')
            ),

            isEditing && h('div', {
              style: {
                marginLeft: (depth * 22 + 12) + 'px', marginBottom: '8px',
                padding: '10px', background: '#f9fafb', border: '1px solid #e5e7eb',
                borderRadius: '6px', display: 'grid', gap: '8px',
              }
            },
              h('label', { style: { display: 'block' } },
                h('span', { style: { fontSize: '11px', fontWeight: 600, color: '#6b7280', display: 'block', marginBottom: '3px' } }, 'Level Title'),
                h('input', {
                  type: 'text', value: node.step.levelTitle || '',
                  onChange: function (e) { handleFieldChange(lp, 'levelTitle', e.target.value); },
                  style: {
                    width: '100%', padding: '5px 8px', fontSize: '13px', boxSizing: 'border-box',
                    border: '1px solid #d1d5db', borderRadius: '4px', background: '#fff',
                  }
                })
              ),
              h('label', { style: { display: 'block' } },
                h('span', { style: { fontSize: '11px', fontWeight: 600, color: '#6b7280', display: 'block', marginBottom: '3px' } }, 'Title'),
                h('input', {
                  type: 'text', value: node.step.title || '',
                  onChange: function (e) { handleFieldChange(lp, 'title', e.target.value); },
                  style: {
                    width: '100%', padding: '5px 8px', fontSize: '13px', boxSizing: 'border-box',
                    border: '1px solid #d1d5db', borderRadius: '4px', background: '#fff',
                  }
                })
              ),
              h('label', { style: { display: 'block' } },
                h('span', { style: { fontSize: '11px', fontWeight: 600, color: '#6b7280', display: 'block', marginBottom: '3px' } }, 'Description (Markdown)'),
                h('textarea', {
                  value: node.step.description || '',
                  onChange: function (e) { handleFieldChange(lp, 'description', e.target.value); },
                  rows: 5,
                  style: {
                    width: '100%', padding: '5px 8px', fontSize: '12px', boxSizing: 'border-box',
                    border: '1px solid #d1d5db', borderRadius: '4px', background: '#fff',
                    fontFamily: 'ui-monospace, monospace', resize: 'vertical',
                  }
                })
              ),
              h('div', { style: { fontSize: '11px', color: '#9ca3af' } },
                'Level path: ',
                h('code', { style: { background: '#e0e7ff', color: '#4338ca', padding: '1px 5px', borderRadius: '3px' } }, lp),
                ' (auto-computed — changes when you drag)'
              )
            ),

            h('div', null, node.children.map(function (child) {
              return renderNode(child, depth + 1);
            }))
          );
        }

        // ── Render ───────────────────────────────────────────────────────────
        var steps = getSteps();
        var root = buildTree(steps);

        return h('div', {
          style: {
            backgroundColor: '#fff', borderRadius: '8px', border: '1px solid #e5e7eb',
            fontFamily: 'ui-sans-serif, system-ui, sans-serif', fontSize: '13px', padding: '0',
          }
        },
          h('div', {
            style: {
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '10px 12px',
              borderBottom: root ? '1px solid #e5e7eb' : 'none',
              background: '#f9fafb',
              borderRadius: root ? '8px 8px 0 0' : '8px',
              border: '1px solid #e5e7eb',
            }
          },
            h('span', { style: { fontWeight: 700, fontSize: '13px', color: '#374151' } }, 'Journey Steps Tree'),
            h('div', { style: { display: 'flex', gap: '6px', alignItems: 'center' } },
              !root && h('button', {
                type: 'button',
                onClick: handleAddRoot,
                style: {
                  padding: '5px 12px', background: '#4f46e5', color: '#fff',
                  border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '12px',
                }
              }, '+ Add Root Node'),
              h('span', { style: { fontSize: '11px', color: '#9ca3af' } },
                steps.length + ' step' + (steps.length !== 1 ? 's' : ''))
            )
          ),

          root
            ? h('div', {
                style: {
                  padding: '10px 12px 12px', border: '1px solid #e5e7eb',
                  borderTop: 'none', borderRadius: '0 0 8px 8px', background: '#fff',
                }
              },
                h('div', {
                  style: { fontSize: '11px', color: '#9ca3af', marginBottom: '8px' }
                }, '⠿ Drag to reorder or reparent · Click Edit to change content'),
                renderNode(root, 0)
              )
            : h('div', {
                style: {
                  padding: '24px', textAlign: 'center',
                  border: '1px solid #e5e7eb', borderTop: 'none',
                  borderRadius: '0 0 8px 8px', background: '#fff',
                }
              },
                h('p', { style: { color: '#9ca3af', fontStyle: 'italic', fontSize: '13px', margin: 0 } },
                  'No steps yet. Add a root node to start building your roadmap.')
              )
        );
      }

      // ── Widget Preview (read-only, also functional) ─────────────────────────

      function JourneyStepsPreview(props) {
        var React = window.React;
        var h = React.createElement;
        var val = props.value;
        var steps = val ? (typeof val.toJS === 'function' ? val.toJS() : val) : [];
        return h('div', { style: { fontFamily: 'ui-sans-serif, system-ui, sans-serif', fontSize: '13px' } },
          h('strong', null, steps.length + ' step' + (steps.length !== 1 ? 's' : '') + ' defined'),
          h('ul', { style: { margin: '8px 0 0', paddingLeft: '16px' } },
            steps.map(function (s, i) {
              return h('li', { key: i, style: { marginBottom: '4px' } },
                h('code', { style: { background: '#e0e7ff', color: '#4338ca', padding: '0 4px', borderRadius: '3px', marginRight: '6px' } }, s.levelPath),
                s.levelTitle ? h('strong', null, s.levelTitle + ': ') : null,
                s.title
              );
            })
          )
        );
      }

      // ── Register ───────────────────────────────────────────────────────────

      try {
        window.CMS.registerWidget('journey-steps', JourneyStepsControl, JourneyStepsPreview);
        console.log('[journey-steps] widget registered successfully');
      } catch (err) {
        console.error('[journey-steps] widget registration failed:', err);
      }
    })();

    // ── Initialise Decap CMS ───────────────────────────────────────────────────
    if (window.CMS) {
      window.CMS.init();
    }
    </script>
  </body>
</html>
