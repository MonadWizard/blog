# Decap CMS Configuration
# Full docs: https://decapcms.org/docs/configuration-options/
#
# TWO MODES — swap the backend block when switching environments:
#
#   LOCAL DEV  → use the "proxy" backend below (already active)
#                Run: npx decap-server
#                Open: http://localhost:4321/blog/admin/
#
#   PRODUCTION → comment out the proxy backend, uncomment the github backend
#                Uses Cloudflare Worker as OAuth proxy (see .claude/specs/cms-setup.md)

# ── Local dev backend (inactive) ─────────────────────────────────────────────
# backend:
#   name: proxy
#   proxy_url: http://localhost:8081/api/v1
#   branch: main

# ── Production backend (active) ───────────────────────────────────────────────
backend:
  name: github
  repo: MonadWizard/blog
  branch: main
  base_url: https://mute-king-c1c2.monad-wizard-r.workers.dev
  auth_endpoint: auth

# Where Decap CMS stores uploaded media files (relative to repo root)
media_folder: "public/images/uploads"
# How the path appears in markdown content (served from site root)
public_folder: "/images/uploads"

collections:
  - name: "tags"
    label: "Tags"
    label_singular: "Tag"
    folder: "src/content/tags"
    create: true
    delete: true
    extension: "json"
    format: "json"
    identifier_field: "name"
    summary: "{{name}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
        hint: "Display name, e.g. PostgreSQL, Django, FastAPI"

  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} ({{pubDate}})"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The post title. Keep it under 70 characters for SEO."

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "One to two sentence summary. Used in post cards and meta tags. Aim for 120-160 characters."

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Tags"
        name: "tags"
        widget: "relation"
        collection: "tags"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        multiple: true
        required: false
        hint: "Pick from managed tags. Add new tags in the Tags section first."

      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: true
        hint: "When true, the post is excluded from the public site."

      - label: "Hero Image"
        name: "heroImage"
        widget: "image"
        required: false
        hint: "Optional cover image. Displayed at the top of the post and in post cards."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Write the post content. Toggle between Rich Text and Markdown mode using the button above the editor."

  - name: "journey"
    label: "With Journey"
    label_singular: "Journey"
    folder: "src/content/journey"
    create: true
    delete: true
    extension: "json"
    format: "json"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The roadmap title, e.g. 'Django: Zero to Advanced'."

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "One to two sentence summary of what this journey covers."

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Updated Date"
        name: "updatedDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false

      - label: "Tags"
        name: "tags"
        widget: "relation"
        collection: "tags"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        multiple: true
        required: false
        hint: "Pick from managed tags. Add new tags in the Tags section first."

      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: true
        hint: "When true, the journey is excluded from the public site."

      - label: "Hero Image"
        name: "heroImage"
        widget: "image"
        required: false
        hint: "Optional cover image."

      - label: "Steps"
        name: "steps"
        widget: "journey-steps"
        hint: "Build the roadmap tree. Drag nodes to reorder or reparent them."
