name: Deploy to GitHub Pages

on:
  # Trigger on push to main branch
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress deploys
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Astro site and upload Pages artifact
        uses: withastro/action@v4
        # withastro/action automatically:
        #   - Detects npm from package-lock.json
        #   - Installs Node.js (v22+)
        #   - Runs npm install && npm run build
        #   - Uploads dist/ as a GitHub Pages artifact

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
